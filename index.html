<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Benefits Bot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-group {
            margin-bottom: 2rem;
        }

        label {
            display: block;
            margin-bottom: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: var(--text);
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        .btn-start:hover:not(:disabled) {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.23);
        }

        .btn-stop {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-stop:hover:not(:disabled) {
            background-color: var(--danger);
            color: white;
            transform: translateY(-2px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .status-stopped { background: rgba(148, 163, 184, 0.1); color: var(--text-muted); }
        .status-running { 
            background: rgba(34, 197, 94, 0.1); 
            color: var(--success);
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .terminal {
            background: #000;
            border-radius: 12px;
            padding: 1.5rem;
            height: 400px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .log-entry {
            margin-bottom: 0.25rem;
        }

        .log-ts { color: #6366f1; margin-right: 0.5rem; }
        .log-engine { color: #c084fc; font-weight: 600; margin-right: 0.5rem; }
        .log-msg { color: #e2e8f0; }
        .log-error { color: #f87171; }

        /* Custom Scrollbar */
        .terminal::-webkit-scrollbar {
            width: 8px;
        }
        .terminal::-webkit-scrollbar-track {
            background: transparent;
        }
        .terminal::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        .terminal::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Bot Dashboard</h1>
            <p class="subtitle">YouTube Watch Time Automation</p>
            <div id="statusBadge" class="status-badge status-stopped">
                <span id="statusDot">●</span> <span id="statusText">STOPPED</span>
            </div>
        </header>

        <div class="input-group">
            <label for="targetUrl">Target YouTube Link</label>
            <input type="text" id="targetUrl" value="https://youtu.be/gNcXZZNoSto" placeholder="Paste your YouTube link here...">
        </div>

        <div class="controls">
            <button id="startBtn" class="btn-start">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                Start Workflow
            </button>
            <button id="stopBtn" class="btn-stop" disabled>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12"></rect></svg>
                Stop Workflow
            </button>
        </div>

        <div class="terminal-header">
            <span>Live System Logs</span>
            <span id="logCount">0 lines</span>
        </div>
        <div class="terminal" id="logTerminal">
            <!-- Logs will appear here -->
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const targetUrlInput = document.getElementById('targetUrl');
        const logTerminal = document.getElementById('logTerminal');
        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const logCountSpan = document.getElementById('logCount');

        let logCount = 0;
        let eventSource = null;

        function addLog(ts, engine, msg, isError = false) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const timestamp = document.createElement('span');
            timestamp.className = 'log-ts';
            timestamp.textContent = `[${ts}]`;
            
            const engineName = document.createElement('span');
            engineName.className = 'log-engine';
            engineName.textContent = engine ? `[${engine}]` : '';
            
            const message = document.createElement('span');
            message.className = isError ? 'log-error' : 'log-msg';
            message.textContent = msg;

            entry.appendChild(timestamp);
            if (engine) entry.appendChild(engineName);
            entry.appendChild(message);

            logTerminal.appendChild(entry);
            logTerminal.scrollTop = logTerminal.scrollHeight;
            
            logCount++;
            logCountSpan.textContent = `${logCount} lines`;
        }

        function setStatus(running) {
            if (running) {
                statusBadge.className = 'status-badge status-running';
                statusText.textContent = 'RUNNING';
                startBtn.disabled = true;
                stopBtn.disabled = false;
                targetUrlInput.disabled = true;
            } else {
                statusBadge.className = 'status-badge status-stopped';
                statusText.textContent = 'STOPPED';
                startBtn.disabled = false;
                stopBtn.disabled = true;
                targetUrlInput.disabled = false;
            }
        }

        function connectLogs() {
            if (eventSource) eventSource.close();
            
            eventSource = new EventSource('/api/logs');
            
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'log') {
                    addLog(data.ts, data.engine, data.msg, data.isError);
                } else if (data.type === 'status') {
                    setStatus(data.running);
                }
            };

            eventSource.onerror = () => {
                console.error('SSE Connection failed. Retrying...');
                eventSource.close();
                setTimeout(connectLogs, 2000);
            };
        }

        startBtn.onclick = async () => {
            const url = targetUrlInput.value.trim();
            if (!url) return alert('Please enter a YouTube URL');

            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                if (!res.ok) throw new Error('Failed to start');
                addLog(new Date().toLocaleTimeString(), '', '🚀 Start request sent...');
            } catch (err) {
                addLog(new Date().toLocaleTimeString(), '', '❌ Error: ' + err.message, true);
            }
        };

        stopBtn.onclick = async () => {
            try {
                const res = await fetch('/api/stop', { method: 'POST' });
                if (!res.ok) throw new Error('Failed to stop');
                addLog(new Date().toLocaleTimeString(), '', '🛑 Stop request sent...');
            } catch (err) {
                addLog(new Date().toLocaleTimeString(), '', '❌ Error: ' + err.message, true);
            }
        };

        // Initial connection
        connectLogs();
    </script>
</body>
</html>
